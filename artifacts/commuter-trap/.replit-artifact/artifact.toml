kind = "web"
previewPath = "/"
title = "The Commuter Trap Dashboard"
version = "1.0.0"
id = "artifacts/commuter-trap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24242

[services.development]
run = "pnpm --filter @workspace/commuter-trap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/commuter-trap", "run", "build" ]
publicDir = "artifacts/commuter-trap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24242"
BASE_PATH = "/"
